<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Hair Studio | Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-page" class="d-flex flex-column justify-content-center align-items-center">
    <h2 class="loading-text">Van Hair Studio</h2>
    <div class="progress w-50">
      <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
    </div>
    <p class="mt-3">Loading your beauty experience...</p>
    <p class="powered">Powered by TechInOp</p>
  </div>

  <script>
    // Progress animation then redirect to home.html
    let progress = 0;
    let progressBar = document.getElementById("progress-bar");
    let interval = setInterval(() => {
      progress += 20;
      progressBar.style.width = progress + "%";
      if (progress >= 100) {
        clearInterval(interval);
        setTimeout(() => {
          localStorage.setItem("visited", "true"); // mark as visited
          window.location.replace("home.html");    // redirect to homepage
        }, 500);
      }
    }, 500);
  </script>
</body>
</html>
