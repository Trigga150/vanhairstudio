<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Hair Studio | Home</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="home.html" class="brand">Van Hair Studio</a>
      <ul class="menu">
        <li><a href="home.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </div>
  </nav>

  <!-- Multi-Item Carousel -->
  <div id="wigCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <!-- Slide 1 -->
      <div class="carousel-item active">
        <div class="row">
          <div class="col-md-4">
            <img src="images/pic1.jpeg" class="d-block w-100" alt="Straight Wig">
          </div>
          <div class="col-md-4">
            <img src="images/pic2.jpeg" class="d-block w-100" alt="Curly Wig">
          </div>
          <div class="col-md-4">
            <img src="images/pic3.jpeg" class="d-block w-100" alt="T-Part Wig">
          </div>
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="carousel-item">
        <div class="row">
          <div class="col-md-4">
            <img src="images/pic7.jpeg" class="d-block w-100" alt="Wig 4">
          </div>
          <div class="col-md-4">
            <img src="images/pic8.jpeg" class="d-block w-100" alt="Wig 5">
          </div>
          <div class="col-md-4">
            <img src="images/pic9.jpeg" class="d-block w-100" alt="Wig 6">
          </div>
        </div>
      </div>
      <!-- Add more slides as needed -->
    </div>
    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#wigCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#wigCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- Highlights -->
  <section class="page">
    <h2>Why Choose Us?</h2>
    <p>We provide premium straight, curly, and T‑Part wigs with nationwide courier service. Our mission is to bring beauty and confidence to every client.</p>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Hair Van Studio | <span class="powered">Powered by TechInOp</span></p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
