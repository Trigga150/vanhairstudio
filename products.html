<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hair Van Studio | Products</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="home.html" class="brand">Hair Van Studio</a>
      <ul class="menu">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </div>
  </nav>

  <!-- Product Selection -->
  <section class="page">
    <h2>Choose Your Wig</h2>

    <!-- Type Selector -->
    <label for="wig-type">Select Type:</label>
    <select id="wig-type" class="form-select">
      <option value="straight">Straight Full Frontal</option>
      <option value="curly">Water Wave / Jelly Curly</option>
      <option value="tpart">T-Part Wig</option>
      <option value="closure">4x4 Closure Wig</option>
      <option value="glueless">Glueless Straight Wig</option>
    </select>

    <!-- Inch Selector -->
    <label for="wig-inch">Select Length (Inches):</label>
    <select id="wig-inch" class="form-select"></select>

    <!-- Color Option -->
    <label for="wig-color">Add Color (+R100):</label>
    <input type="checkbox" id="wig-color">

    <!-- Price Display -->
    <p id="wig-price">Price: R0</p>

    <!-- Quantity -->
    <label for="wig-qty">Quantity:</label>
    <input type="number" id="wig-qty" min="1" value="1">

    <!-- Add to Cart -->
    <button id="add-to-cart" class="btn">Add to Cart</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Hair Van Studio | <span class="powered">Powered by TechInOp</span></p>
  </footer>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
</html>
